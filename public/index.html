<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jídelníček — AI Diet Planner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>🥗 Jídelníček</h1>
        <p>AI Diet Planner</p>
      </div>
      <div class="user-list" id="userList"></div>
      <div class="btn-new-user" onclick="showUserModal()">+ Nový uživatel</div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <div class="week-nav">
          <button onclick="changeWeek(-1)">◀</button>
          <span class="week-label" id="weekLabel"></span>
          <button onclick="changeWeek(1)">▶</button>
        </div>
        <div class="topbar-actions">
          <button class="generate" onclick="generatePlan()" id="btnGenerate">✨ Generovat týden</button>
          <button onclick="showPrep()">📋 Příprava</button>
          <button onclick="showShopping()">🛒 Nákup</button>
          <button onclick="showUserModal()" id="btnProfile">👤 Profil</button>
          <button class="danger" onclick="deletePlan()">🗑️</button>
        </div>
      </div>

      <div class="content">
        <div class="plan-area" id="planArea">
          <div class="empty-state" id="emptyState">
            <div class="icon">🍽️</div>
            <h2>Začněte vytvořením profilu</h2>
            <p>Přidejte uživatele a vygenerujte týdenní jídelníček pomocí AI</p>
          </div>
        </div>

        <div class="chat-area">
          <div class="chat-header">
            <div class="ai-dot"></div>
            AI Asistent
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="chat-msg system">AI asistent vám pomůže upravit jídelníček podle vašich přání</div>
          </div>
          <div class="chat-input-area">
            <textarea id="chatInput" placeholder="Zeptej se AI na změny jídelníčku..." rows="1" onkeydown="handleChatKey(event)"></textarea>
            <button onclick="sendChat()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <h2 id="userModalTitle">Nový uživatel</h2>
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>Jméno</label>
        <input id="fName" placeholder="Jan Novák">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Jazyk</label>
          <select id="fLocale">
            <option value="cs">Čeština</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="form-group">
          <label>Pohlaví</label>
          <select id="fSex">
            <option value="">—</option>
            <option value="male">Muž</option>
            <option value="female">Žena</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Aktuální váha (kg)</label>
          <input id="fWeight" type="number" step="0.1">
        </div>
        <div class="form-group">
          <label>Cílová váha (kg)</label>
          <input id="fWeightGoal" type="number" step="0.1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Výška (cm)</label>
          <input id="fHeight" type="number">
        </div>
        <div class="form-group">
          <label>Věk</label>
          <input id="fAge" type="number">
        </div>
      </div>
      <div class="form-group">
        <label>Aktivita</label>
        <select id="fActivity">
          <option value="sedentary">Sedavý</option>
          <option value="light">Lehká</option>
          <option value="moderate" selected>Střední</option>
          <option value="active">Aktivní</option>
          <option value="very_active">Velmi aktivní</option>
        </select>
      </div>
      <div class="form-group">
        <label>Diety / restrikce</label>
        <input id="fRestrictions" placeholder="např. bezlepková, vegetariánská, alergie na ořechy...">
      </div>
      <div class="modal-actions">
        <button onclick="closeUserModal()">Zrušit</button>
        <button class="primary" onclick="saveUser()">Uložit</button>
      </div>
    </div>
  </div>

  <!-- Shopping List -->
  <div class="shop-overlay" id="shopOverlay" onclick="closeShopIfBg(event)">
    <div class="shop-panel">
      <h2>🛒 Nákupní seznam <button onclick="closeShop()">✕</button></h2>
      <div class="shop-items" id="shopItems"></div>
    </div>
  </div>

  <!-- Prep Guide -->
  <div class="prep-overlay" id="prepOverlay" onclick="closePrepIfBg(event)">
    <div class="prep-panel">
      <h2>📋 Příprava <button onclick="closePrep()">✕</button></h2>
      <div class="prep-content" id="prepContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
