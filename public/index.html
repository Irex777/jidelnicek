<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jídelníček — AI Diet Planner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Mobile Header -->
    <header class="mobile-header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h1>🥗 Jídelníček</h1>
      <button class="user-btn" onclick="showUserModal()">👤</button>
    </header>

    <!-- Sidebar (overlay on mobile) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>🥗 Jídelníček</h1>
        <p>AI Diet Planner</p>
      </div>
      <div class="user-list" id="userList"></div>
      <div class="btn-new-user" onclick="showUserModal(); closeSidebar();">+ Nový uživatel</div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Week nav bar -->
      <div class="topbar">
        <div class="week-nav">
          <button onclick="changeWeek(-1)">‹</button>
          <span class="week-label" id="weekLabel"></span>
          <button onclick="changeWeek(1)">›</button>
        </div>
        <button class="btn-generate" onclick="generatePlan()" id="btnGenerate">✨ Generovat</button>
        <div class="topbar-actions">
          <button onclick="showShopping()" title="Nákupní seznam">🛒</button>
          <button onclick="showPrep()" title="Příprava">📋</button>
          <button onclick="deletePlan()" class="danger" title="Smazat">🗑️</button>
        </div>
      </div>

      <!-- User strip (shows selected user info) -->
      <div class="user-strip" id="userStrip"></div>

      <!-- Plan cards -->
      <div class="plan-area" id="planArea">
        <div class="empty-state">
          <div class="icon">🍽️</div>
          <h2>Začněte vytvořením profilu</h2>
          <p>Přidejte uživatele a vygenerujte týdenní jídelníček pomocí AI</p>
        </div>
      </div>

      <!-- Chat (bottom sheet on mobile) -->
      <div class="chat-section">
        <div class="chat-toggle" id="chatToggle" onclick="toggleChat()">
          <div class="ai-dot"></div>
          <span>AI Asistent</span>
          <span class="chat-toggle-arrow" id="chatArrow">▲</span>
        </div>
        <div class="chat-body" id="chatBody">
          <div class="chat-messages" id="chatMessages">
            <div class="chat-msg system">AI asistent vám pomůže upravit jídelníček podle vašich přání</div>
          </div>
          <div class="chat-input-area">
            <textarea id="chatInput" placeholder="Zeptej se AI na změny..." rows="1" onkeydown="handleChatKey(event)"></textarea>
            <button onclick="sendChat()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <h2 id="userModalTitle">Nový uživatel</h2>
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>Jméno</label>
        <input id="fName" placeholder="Jan Novák">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Jazyk</label>
          <select id="fLocale">
            <option value="cs">Čeština</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="form-group">
          <label>Pohlaví</label>
          <select id="fSex">
            <option value="">—</option>
            <option value="male">Muž</option>
            <option value="female">Žena</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Váha (kg)</label>
          <input id="fWeight" type="number" step="0.1" placeholder="Aktuální">
        </div>
        <div class="form-group">
          <label>Cíl (kg)</label>
          <input id="fWeightGoal" type="number" step="0.1" placeholder="Cílová">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Výška (cm)</label>
          <input id="fHeight" type="number">
        </div>
        <div class="form-group">
          <label>Věk</label>
          <input id="fAge" type="number">
        </div>
      </div>
      <div class="form-group">
        <label>Aktivita</label>
        <select id="fActivity">
          <option value="sedentary">Sedavý</option>
          <option value="light">Lehká</option>
          <option value="moderate" selected>Střední</option>
          <option value="active">Aktivní</option>
          <option value="very_active">Velmi aktivní</option>
        </select>
      </div>
      <div class="form-group">
        <label>Diety / restrikce</label>
        <input id="fRestrictions" placeholder="např. bezlepková, vegetariánská...">
      </div>
      <div class="modal-actions">
        <button onclick="closeUserModal()">Zrušit</button>
        <button class="primary" onclick="saveUser()">Uložit</button>
      </div>
    </div>
  </div>

  <!-- Shopping List -->
  <div class="overlay-panel" id="shopOverlay" onclick="closeShopIfBg(event)">
    <div class="panel-sheet">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <h2>🛒 Nákupní seznam</h2>
        <button onclick="closeShop()">✕</button>
      </div>
      <div class="panel-body" id="shopItems"></div>
    </div>
  </div>

  <!-- Prep Guide -->
  <div class="overlay-panel" id="prepOverlay" onclick="closePrepIfBg(event)">
    <div class="panel-sheet">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <h2>📋 Příprava</h2>
        <button onclick="closePrep()">✕</button>
      </div>
      <div class="panel-body" id="prepContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
